<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마케팅AI — 소상공인 마케팅 플랫폼</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* 헤더 */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 24px 20px;
            color: white;
        }
        .header h1 { font-size: 20px; font-weight: 700; }
        .header p { font-size: 14px; opacity: 0.9; margin-top: 4px; }

        /* 메인 컨테이너 */
        .container { max-width: 480px; margin: 0 auto; padding: 20px; }

        /* 자연어 입력 영역 */
        .input-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }
        .input-section label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            display: block;
            margin-bottom: 8px;
        }
        .input-section textarea {
            width: 100%;
            min-height: 80px;
            border: 1.5px solid #e0e0e0;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-section textarea:focus { border-color: #667eea; }
        .input-section textarea::placeholder { color: #aaa; }

        .btn-generate {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: opacity 0.2s;
        }
        .btn-generate:hover { opacity: 0.9; }
        .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 추천 제안 카드 */
        .suggestions {
            margin-bottom: 16px;
        }
        .suggestions h3 {
            font-size: 13px;
            font-weight: 600;
            color: #888;
            margin-bottom: 8px;
        }
        .suggestion-card {
            background: white;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.15s;
            border-left: 3px solid #667eea;
        }
        .suggestion-card:hover { transform: translateX(4px); }
        .suggestion-card .title { font-size: 14px; font-weight: 600; color: #333; }
        .suggestion-card .desc { font-size: 12px; color: #666; margin-top: 4px; }
        .suggestion-card .tag {
            display: inline-block;
            font-size: 11px;
            background: #f0eeff;
            color: #667eea;
            padding: 2px 8px;
            border-radius: 8px;
            margin-top: 6px;
        }

        /* 로딩 */
        .loading {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        .loading .spinner {
            width: 40px; height: 40px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { font-size: 14px; color: #666; }

        /* 결과 영역 */
        .result-section { display: none; }

        .result-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .result-card h3 {
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
        }
        .result-card .content {
            font-size: 15px;
            line-height: 1.7;
            color: #333;
            white-space: pre-wrap;
        }

        /* 데이터 근거 표시 */
        .data-badge {
            background: #f8f8ff;
            border: 1px solid #e8e5ff;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .data-badge p {
            font-size: 12px;
            color: #666;
            line-height: 1.5;
        }
        .data-badge .label {
            font-size: 11px;
            font-weight: 600;
            color: #667eea;
        }

        /* 액션 버튼들 */
        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .btn-action {
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1.5px solid #e0e0e0;
            background: white;
            color: #333;
            transition: all 0.2s;
        }
        .btn-action:hover { border-color: #667eea; color: #667eea; }
        .btn-action.primary {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .btn-action.primary:hover { background: #5a6fd6; }

        /* 하단 네비게이션 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #eee;
            max-width: 480px;
            margin: 0 auto;
        }
        .nav-item {
            text-align: center;
            font-size: 11px;
            color: #999;
            text-decoration: none;
        }
        .nav-item.active { color: #667eea; }
        .nav-item .icon { font-size: 20px; display: block; margin-bottom: 2px; }

        /* 토스트 알림 */
        .toast {
            display: none;
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <!-- 헤더 -->
    <div class="header">
        <h1>마케팅AI</h1>
        <p>김OO 사장님, 오늘은 뭘 홍보해볼까요?</p>
    </div>

    <div class="container">

        <!-- 자연어 입력 -->
        <div class="input-section">
            <label>💬 홍보하고 싶은 내용을 자유롭게 써주세요</label>
            <textarea id="userInput" placeholder="예: 복숭아 제철이고 곧 축제 열리니까, 복숭아 케이크 한정판매 홍보물 만들어줘"></textarea>
            <button class="btn-generate" id="generateBtn" onclick="generate()">✨ 콘텐츠 만들기</button>
        </div>

        <!-- 추천 제안 -->
        <div class="suggestions">
            <h3>📌 추천 제안</h3>
            <div class="suggestion-card" onclick="fillPrompt('복숭아 제철이니까 복숭아 케이크 한정판매 홍보해줘')">
                <div class="title">🍑 복숭아 축제 시즌</div>
                <div class="desc">제철 복숭아 활용 한정메뉴 홍보는 어떨까요?</div>
                <span class="tag">축제시즌</span>
            </div>
            <div class="suggestion-card" onclick="fillPrompt('여름 시원한 음료 신메뉴 출시 인스타 홍보 만들어줘')">
                <div class="title">☀️ 여름 신메뉴 홍보</div>
                <div class="desc">더운 날씨에 맞는 시원한 메뉴 홍보물 제안</div>
                <span class="tag">시즌</span>
            </div>
            <div class="suggestion-card" onclick="fillPrompt('주말 가족 고객 대상 디저트 세트 할인 이벤트 홍보해줘')">
                <div class="title">👨‍👩‍👧 주말 유동인구 증가</div>
                <div class="desc">이번 주말 가족 단위 손님을 잡아보세요</div>
                <span class="tag">상권</span>
            </div>
        </div>

        <!-- 로딩 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>AI가 상권·관광 데이터를 분석하고<br>맞춤 홍보 문구를 작성하고 있어요...</p>
        </div>

        <!-- 결과 영역 -->
        <div class="result-section" id="resultSection">

            <!-- 데이터 근거 -->
            <div class="data-badge" id="dataBadge">
                <p class="label">📊 활용된 데이터</p>
                <p id="dataInfo">상권·관광 데이터 로딩 중...</p>
            </div>

            <!-- 인스타 캡션 -->
            <div class="result-card">
                <h3>📸 인스타그램 캡션</h3>
                <div class="content" id="instagramResult"></div>
            </div>

            <!-- 배너 문구 -->
            <div class="result-card">
                <h3>🎨 배너 문구</h3>
                <div class="content" id="bannerResult"></div>
            </div>

            <!-- 해시태그 -->
            <div class="result-card">
                <h3>#️⃣ 추천 해시태그</h3>
                <div class="content" id="hashtagResult"></div>
            </div>

            <!-- 액션 버튼 -->
            <div class="action-buttons">
                <button class="btn-action" onclick="copyResult()">📋 텍스트 복사</button>
                <button class="btn-action" onclick="regenerate()">🔄 다시 생성</button>
                <button class="btn-action primary" onclick="confirmResult()">✅ 확정 & 저장</button>
            </div>
        </div>

    </div>

    <!-- 하단 네비게이션 -->
    <div class="bottom-nav">
        <a class="nav-item active" href="#">
            <span class="icon">🏠</span>홈
        </a>
        <a class="nav-item" href="#">
            <span class="icon">📊</span>리포트
        </a>
        <a class="nav-item" href="#">
            <span class="icon">🗺️</span>관광
        </a>
        <a class="nav-item" href="#">
            <span class="icon">⚙️</span>설정
        </a>
    </div>

    <!-- 토스트 -->
    <div class="toast" id="toast"></div>

    <script>
        let lastResult = {};

        function fillPrompt(text) {
            document.getElementById('userInput').value = text;
            document.getElementById('userInput').focus();
        }

        async function generate() {
            const input = document.getElementById('userInput').value.trim();
            if (!input) {
                showToast('홍보할 내용을 입력해주세요!');
                return;
            }

            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const resultSection = document.getElementById('resultSection');

            btn.disabled = true;
            loading.style.display = 'block';
            resultSection.style.display = 'none';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: input })
                });
                const data = await response.json();

                if (data.success) {
                    lastResult = data;
                    document.getElementById('instagramResult').textContent = data.instagram || '(생성 실패)';
                    document.getElementById('bannerResult').textContent = data.banner || '(생성 실패)';
                    document.getElementById('hashtagResult').textContent = data.hashtags || '';
                    document.getElementById('dataInfo').textContent =
                        `${data.market_info || '-'} | ${data.festival_info || '-'}`;
                    resultSection.style.display = 'block';
                } else {
                    showToast('오류: ' + (data.error || '알 수 없는 오류'));
                }
            } catch (err) {
                showToast('서버 연결에 실패했습니다.');
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }

        function regenerate() {
            generate();
        }

        function copyResult() {
            const text = `${lastResult.instagram || ''}\n\n${lastResult.banner || ''}\n\n${lastResult.hashtags || ''}`;
            navigator.clipboard.writeText(text).then(() => {
                showToast('📋 클립보드에 복사되었습니다!');
            });
        }

        function confirmResult() {
            showToast('✅ 저장되었습니다! SNS에 게시해보세요.');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2500);
        }
    </script>
</body>
</html>
