<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>정책 인사이트 — 세종경제관광진흥원</title>
    <style>
        :root { --primary:#667eea; --success:#10b981; --bg:#f5f5f7; --card:#fff; --text:#1e293b; --text-light:#64748b; --border:#e2e8f0; }
        * { margin:0; padding:0; box-sizing:border-box; word-break:keep-all; }
        html { overflow-y: scroll; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text);
               max-width:480px; margin:0 auto; min-height:100vh; padding-bottom:80px; }
        .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px;
            background:var(--card); border-top:1px solid var(--border); display:flex; justify-content:space-around; padding:10px 0 18px; z-index:100; }
        .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; font-size:11px; color:var(--text-light); text-decoration:none; }
        .nav-item.active { color:var(--primary); }
        .nav-item .icon { font-size:20px; }
        .card { background:var(--card); border-radius:16px; padding:20px; margin:12px 16px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
        .page-header { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; height:88px; padding:0 20px;
            display:flex; flex-direction:column; justify-content:center; }
        .page-header h1 { font-size:1.3rem; font-weight:800; }
        .page-header p { font-size:.85rem; color:rgba(255,255,255,.9); margin-top:4px; }
        .sec { padding:0 16px; margin:18px 0 8px; font-size:14px; font-weight:700; }
        .finding { display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; line-height:1.6; }
        .finding:last-child { border-bottom:none; }
        .finding .dot { color:var(--primary); font-weight:800; flex-shrink:0; }
        .bar-row { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
        .bar-row .name { width:84px; font-size:13px; flex-shrink:0; }
        .bar-wrap { flex:1; background:#eef2ff; border-radius:8px; height:20px; overflow:hidden; }
        .bar { height:100%; background:linear-gradient(135deg,#667eea,#764ba2); border-radius:8px; }
        .bar-row .cnt { width:44px; text-align:right; font-size:13px; font-weight:700; color:var(--primary); }
        .empty { font-size:13px; color:#94a3b8; text-align:center; padding:14px; }
    </style>
</head>
<body>
    <div class="page-header">
        <h1>정책 인사이트</h1>
        <p>세종경제관광진흥원 · 다음 사업 기획 근거</p>
    </div>

    <p class="sec">핵심 시사점</p>
    <div class="card" id="findings"><div class="empty">분석 중…</div></div>

    <p class="sec">업종별 마케팅 수요</p>
    <div class="card" id="byCategory"><div class="empty">불러오는 중…</div></div>

    <div class="card" style="background:#f0fdf4; border:1px solid #bbf7d0;">
        <div style="font-size:13px; line-height:1.7; color:#166534;">
            💡 업종·시즌·축제 연계 데이터가 쌓일수록, 다음 지원사업·축제 기획의
            <b>참고 근거</b>로 활용할 수 있습니다.
        </div>
    </div>

    <nav class="bottom-nav">
        <a class="nav-item" href="/admin"><span class="icon">📊</span>대시보드</a>
        <a class="nav-item" href="/admin/stores"><span class="icon">🏬</span>가게</a>
        <a class="nav-item active" href="/admin/insights"><span class="icon">💡</span>인사이트</a>
        <a class="nav-item" href="/admin/calendar"><span class="icon">📅</span>캘린더</a>
    </nav>

    <script>
        async function load(){
            const d = await (await fetch('/api/admin/insights')).json();
            document.getElementById('findings').innerHTML = d.findings.length
                ? d.findings.map(f => `<div class="finding"><span class="dot">•</span><span>${f}</span></div>`).join('')
                : '<div class="empty">데이터 없음</div>';
            const max = Math.max(1, ...d.by_category.map(c => c.count));
            document.getElementById('byCategory').innerHTML = d.by_category.length
                ? d.by_category.map(c => `<div class="bar-row"><div class="name">${c.category}</div>
                    <div class="bar-wrap"><div class="bar" style="width:${Math.round(c.count/max*100)}%"></div></div>
                    <div class="cnt">${c.count}건</div></div>`).join('')
                : '<div class="empty">데이터 없음</div>';
        }
        load();
    </script>
</body>
</html>
