<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>시즌·축제 캘린더 — 세종경제관광진흥원</title>
    <style>
        :root { --primary:#667eea; --success:#10b981; --bg:#f5f5f7; --card:#fff; --text:#1e293b; --text-light:#64748b; --border:#e2e8f0; }
        * { margin:0; padding:0; box-sizing:border-box; word-break:keep-all; }
        html { overflow-y: scroll; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text);
               max-width:480px; margin:0 auto; min-height:100vh; padding-bottom:80px; }
        .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px;
            background:var(--card); border-top:1px solid var(--border); display:flex; justify-content:space-around; padding:10px 0 18px; z-index:100; }
        .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; font-size:11px; color:var(--text-light); text-decoration:none; }
        .nav-item.active { color:var(--primary); }
        .nav-item .icon { font-size:20px; }
        .page-header { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; height:88px; padding:0 20px;
            display:flex; flex-direction:column; justify-content:center; }
        .page-header h1 { font-size:1.3rem; font-weight:800; }
        .page-header p { font-size:.85rem; color:rgba(255,255,255,.9); margin-top:4px; }
        .sec { padding:0 16px; margin:18px 0 8px; font-size:14px; font-weight:700; }
        .fest { background:#fff; border:1px solid var(--border); border-left:4px solid var(--primary);
                border-radius:12px; padding:16px; margin:10px 16px; display:flex; align-items:center; gap:14px; }
        .fest.done { border-left-color:#cbd5e1; opacity:.7; }
        .fest.ing { border-left-color:var(--success); }
        .fest .body { flex:1; }
        .fest .t { font-size:15px; font-weight:700; }
        .fest .d { font-size:12px; color:var(--text-light); margin-top:4px; line-height:1.5; }
        .fest .dday { text-align:center; flex-shrink:0; }
        .fest .dday .n { font-size:1.2rem; font-weight:800; color:var(--primary); }
        .fest .dday .s { font-size:11px; color:var(--text-light); }
        .tag { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; margin-top:6px; }
        .tag.ing { background:#dcfce7; color:#166534; }
        .tag.up { background:#eef2ff; color:var(--primary); }
        .tag.done { background:#f1f5f9; color:#94a3b8; }
        .empty { font-size:13px; color:#94a3b8; text-align:center; padding:14px; }
    </style>
</head>
<body>
    <div class="page-header">
        <h1>시즌·축제 캘린더</h1>
        <p>세종경제관광진흥원 · 선제 지원 계획</p>
    </div>

    <p class="sec">다가오는 축제·시즌</p>
    <div id="list"><div class="empty">불러오는 중…</div></div>

    <nav class="bottom-nav">
        <a class="nav-item" href="/admin"><span class="icon">📊</span>대시보드</a>
        <a class="nav-item" href="/admin/stores"><span class="icon">🏬</span>가게</a>
        <a class="nav-item" href="/admin/insights"><span class="icon">💡</span>인사이트</a>
        <a class="nav-item active" href="/admin/calendar"><span class="icon">📅</span>캘린더</a>
    </nav>

    <script>
        async function load(){
            const d = await (await fetch('/api/admin/calendar')).json();
            const box = document.getElementById('list');
            box.innerHTML = d.festivals.map(f => {
                const cls = f.status === '진행중' ? 'ing' : (f.status === '종료' ? 'done' : '');
                const tag = f.status === '진행중' ? '<span class="tag ing">진행중</span>'
                    : (f.status === '종료' ? '<span class="tag done">종료</span>' : '<span class="tag up">예정</span>');
                const dday = f.status === '예정' ? `<div class="n">D-${f.dday}</div><div class="s">${tag}</div>`
                    : `<div class="s">${tag}</div>`;
                return `<div class="fest ${cls}">
                    <div class="body">
                        <div class="t">🎉 ${f.title}</div>
                        <div class="d">${f.start} ~ ${f.end}<br>${f.place}</div>
                    </div>
                    <div class="dday">${dday}</div>
                </div>`;
            }).join('');
        }
        load();
    </script>
</body>
</html>
